<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>WIN WIN KALDEREN AB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: white;
      color: black;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      letter-spacing: 0.1em;
    }

    /* Sticker */
    .sticker {
      position: fixed;
      top: 40px;
      right: 40px;
      width: 200px;        /* justera storlek här */
      z-index: 1000;
    }

    @media (max-width: 600px) {
      .sticker {
        width: 90px;       /* mindre på mobil */
        top: 10px;
        right: 10px;
      }
    }
  </style>
</head>
<body>

  <img src="sticker.gif" alt="Win Win Kalderen" class="sticker">

  <div>
    <h1>WIN WIN KALDEREN AB</h1>
  </div>

</body>
</html>

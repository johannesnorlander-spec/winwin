<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Win-Win Kalderén AB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: white;
      color: black;
      min-height: 200vh; /* tillfälligt för att möjliggöra scroll */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .content {
      text-align: center;
      max-width: 520px;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.2rem;
      letter-spacing: 0.08em;
      margin-bottom: 2.5rem;
    }

    p {
      margin: 1.2rem 0;
      line-height: 1.6;
      font-size: 1rem;
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(0,0,0,0.3);
    }

    a:hover {
      border-bottom: 1px solid black;
    }

    /* Sticker */
    .sticker {
      position: fixed;
      top: -40px;
      right: -40px;
      width: 180px;
      z-index: 1000;
      opacity: 0;
      transform: translateY(-20px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .sticker.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .sticker img {
      width: 100%;
      display: block;
    }

    @media (max-width: 600px) {
      .sticker {
        width: 120px;
        top: -25px;
        right: -25px;
      }

      h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>

<body>

  <!-- Sticker som visas efter scroll -->
  <a href="mailto:ulrika@kalderen.se" class="sticker" id="sticker">
    <img src="assets/sticker.gif" alt="Win-Win Kalderén">
  </a>

  <div class="content">
    <h1>Win-Win Kalderén AB</h1>

    <p>
      Skogstorpsvägen 95<br>
      191 39 Sollentuna
    </p>

    <p>
      Mail: <a href="mailto:ulrika@kalderen.se">ulrika@kalderen.se</a>
    </p>

    <p>
      VAT SE559503068401<br>
      Bankgiro 5061-7638
    </p>
  </div>

  <script>
    const sticker = document.getElementById("sticker");

    window.addEventListener("scroll", function () {
      if (window.scrollY > 200) {
        sticker.classList.add("visible");
      } else {
        sticker.classList.remove("visible");
      }
    });
  </script>

</body>
</html>
